<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antonella 3 anos</title>

<link rel="stylesheet" href="style.css">

<!-- GRÁFICO -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="start" onclick="iniciar()">
  <h1>💖 Toque para começar 💖</h1>
</div>

<video id="bgVideo" loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="card">
  <h3>🎉 Você foi convidado</h3>

  <img src="foto.jpg" class="foto">

  <div class="nome">Antonella 💖</div>

  <p>Prepare-se para uma festa incrível cheia de música e diversão 💖✨</p>
  <p>📅 14/07 às 16h</p>
  <p>📍 Kifulia Festas</p>

  <button class="btn" onclick="abrirForm()">Confirmar</button>

  <div id="form">
    <input id="nome" placeholder="Nome">
    <input id="adultos" type="number" placeholder="Adultos">
    <input id="criancas" type="number" placeholder="Crianças">
    <button class="btn" onclick="enviar()">Enviar</button>
  </div>
</div>

<button class="btn-admin" onclick="loginAdmin()">🔐 Admin</button>

<div id="lista" style="display:none;"></div>

<script type="module" src="script.js"></script>

</body>
</html>
