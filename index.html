<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antonella 3 anos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

/* CONTADOR */
.contador{
  position:fixed;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-weight:bold;
  font-size:16px;
  z-index:999;
  text-shadow:0 0 10px black;
}

/* VIDEO (CORRIGIDO) */
video{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  object-position:center;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:-1;
}

/* TELA INICIAL */
.start{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#ff4ecd,#7a5cff,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:10;
  cursor:pointer;
}

/* CARD */
.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

.foto{
  width:100px;
  border-radius:50%;
}

.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#ff4ecd;
  color:white;
  width:100%;
}

#form{display:none;}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:10px;
  border:none;
}

/* LINK MAPA */
.mapa{
  display:block;
  margin-top:8px;
  color:#00e0ff;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="contador" id="contador"></div>

<div class="start" onclick="iniciar()">
  <h1>💖 Toque para começar 💖</h1>
</div>

<video id="bgVideo" loop muted playsinline autoplay>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="card">
  <h3>🎉 Você foi convidado</h3>

  <img src="foto.jpg" class="foto">

  <h2>💖 Antonella 3 anos 💖</h2>

  <p>✨💖 Prepare-se para uma festa incrível, você é nosso convidado especial!💖✨</p>
  <p>📅 19/07 às 16h</p>

  <p>📍 Espaço 487</p>

  <!-- LINK MAPA -->
  <a class="mapa" href="https://maps.app.goo.gl/fK5Zr7SYsgzfV4Y2A?g_st=ac" target="_blank">
    📍 Abrir no mapa
  </a>

  <button class="btn" onclick="abrirForm()">Confirmar</button>

  <div id="form">
    <input id="nome" placeholder="Nome">
    <input id="adultos" type="number" placeholder="Adultos">
    <input id="criancas" type="number" placeholder="Crianças">
    <button class="btn" onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
// INICIAR
function iniciar(){
  document.querySelector(".start").style.display="none";
  let video = document.getElementById("bgVideo");
  video.muted = false;
  video.play();
}

// FORM
function abrirForm(){
  document.getElementById("form").style.display="block";
}

// WHATSAPP
function enviar(){
  let nome = document.getElementById("nome").value;
  let adultos = document.getElementById("adultos").value || 0;
  let criancas = document.getElementById("criancas").value || 0;

  if(!nome){
    alert("Digite seu nome!");
    return;
  }

  let texto = `Confirmado! 🎉
Nome: ${nome}
Adultos: ${adultos}
Crianças: ${criancas}`;

  window.open(`https://wa.me/5524998432810?text=${encodeURIComponent(texto)}`);
}

// CONTADOR (CORRIGIDO)
let dataEvento = new Date("2026-07-19T16:00:00");

setInterval(()=>{
  let agora = new Date();
  let diff = dataEvento - agora;

  if(diff <= 0){
    document.getElementById("contador").innerHTML = "🎉 É HOJE! 🎉";
    return;
  }

  let dias = Math.floor(diff/(1000*60*60*24));
  let horas = Math.floor((diff/(1000*60*60))%24);
  let minutos = Math.floor((diff/(1000*60))%60);

  document.getElementById("contador").innerHTML =
    `Faltam ${dias}d ${horas}h ${minutos}min 🎉`;
},1000);
</script>

</body>
</html>
